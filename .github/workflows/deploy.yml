# GitHub Actions fallback for Acriva Worker + D1.
# Preferred path: Cloudflare Workers Builds (Git connected on Worker `acriva`).
# Agents must NOT run `wrangler deploy` / direct upload locally.
# Path if using this workflow: commit + push master → build → wrangler deploy.
#
# CF token in secrets MUST allow Any IP (GHA runner IPs are not fixed).
# IP allowlists → code 9109 "Cannot use the access token from location".
name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-acriva-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
