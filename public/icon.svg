<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Acriva">
  <!-- Direction A — Triad A monogram; readable at 16px -->
  <rect width="32" height="32" rx="8" fill="#0A0A0A"/>
  <!-- Left leg -->
  <path d="M9 24 L15.2 8.5" stroke="#FAFAFA" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Right leg -->
  <path d="M23 24 L16.8 8.5" stroke="#FAFAFA" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Crossbar (Finance ↔ Market bridge / expert counsel) -->
  <path d="M11.4 17.5 H20.6" stroke="#FAFAFA" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Apex ledger node -->
  <rect x="14.25" y="6.75" width="3.5" height="3.5" rx="0.6" fill="#0F766E"/>
</svg>
